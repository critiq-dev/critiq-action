# Reusable workflow: checkout the caller repo and run critiq-dev/critiq-action.
name: Reusable Critiq scan

on:
  workflow_call:
    inputs:
      cli-version:
        description: npm dist-tag or semver for @critiq/cli
        type: string
        default: latest
      rules-version:
        description: npm dist-tag or semver for @critiq/rules
        type: string
        default: latest
      working-directory:
        description: Working directory for npm install and scan (relative to repository root)
        type: string
        default: '.'
      target:
        description: Path argument to critiq check
        type: string
        default: '.'
      comment-mode:
        description: off | inline | inline+summary
        type: string
        default: inline
      fail-on-severity:
        description: off | low | medium | high | critical — fail when any finding meets or exceeds this level
        type: string
        default: 'off'

jobs:
  critiq:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Keep this ref aligned with the branch/tag of this workflow file (e.g. bump to @v1 when releasing).
      - name: Run Critiq
        uses: critiq-dev/critiq-action@main
        with:
          cli-version: ${{ inputs.cli-version }}
          rules-version: ${{ inputs.rules-version }}
          working-directory: ${{ inputs.working-directory }}
          target: ${{ inputs.target }}
          comment-mode: ${{ inputs.comment-mode }}
          fail-on-severity: ${{ inputs.fail-on-severity }}
