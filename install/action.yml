name: Install Critiq CLI and rules
description: >-
  Installs repository dependencies when package.json exists, then installs @critiq/cli and @critiq/rules
  from npm when the root manifest does not declare @critiq/cli.

inputs:
  working-directory:
    description: Directory for npm and resolution (relative to GITHUB_WORKSPACE)
    required: false
    default: '.'
  cli-version:
    description: Semver or dist-tag for @critiq/cli
    required: false
    default: 'latest'
  rules-version:
    description: Semver or dist-tag for @critiq/rules
    required: false
    default: 'latest'

runs:
  using: composite
  steps:
    - shell: bash
      run: node "${{ github.action_path }}/install.mjs"
      env:
        INPUT_WORKING_DIRECTORY: ${{ inputs.working-directory }}
        INPUT_CLI_VERSION: ${{ inputs.cli-version }}
        INPUT_RULES_VERSION: ${{ inputs.rules-version }}
