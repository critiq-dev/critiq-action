name: Critiq
description: Run the Critiq OSS CLI and post inline PR review comments from the findings.
author: Critiq

branding:
  icon: check-circle
  color: purple

inputs:
  cli-version:
    description: Semver range or dist-tag for @critiq/cli (npm) when the repo does not declare @critiq/cli on the root package.json
    required: false
    default: 'latest'
  rules-version:
    description: Semver range or dist-tag for @critiq/rules (npm) when installing published packages alongside the CLI
    required: false
    default: 'latest'
  working-directory:
    description: Directory containing the checkout (must be inside the git repo for diff scans)
    required: false
    default: '.'
  target:
    description: Path passed to critiq check (directory or file under the repo)
    required: false
    default: '.'
  base-ref:
    description: Git ref for diff base. On pull_request, leave empty to use the PR base SHA.
    required: false
    default: ''
  head-ref:
    description: Git ref for diff head. On pull_request, leave empty to use the PR head SHA.
    required: false
    default: ''
  staged:
    description: When true, pass --staged to critiq check (cannot be combined with base/head)
    required: false
    default: 'false'
  fail-on-severity:
    description: Fail the job when any finding is at or above this severity (off | low | medium | high | critical). Default off never fails for severity.
    required: false
    default: 'off'
  comment-mode:
    description: off | inline | inline+summary (summary is a sticky issue comment on the PR)
    required: false
    default: 'inline'

outputs:
  exit-code:
    description: Exit code from critiq check
    value: ${{ steps.scan.outputs.exit-code }}
  finding-count:
    description: Number of catalog findings in the JSON envelope
    value: ${{ steps.scan.outputs.finding-count }}
  json-path:
    description: Path to the critiq JSON output file on the runner
    value: ${{ steps.scan.outputs.json-path }}
  review-comments-created:
    description: Number of inline review comments created in the last post step
    value: ${{ steps.post.outputs.review-comments-created }}
  review-comments-skipped:
    description: Number of findings skipped (dedupe or resolved thread)
    value: ${{ steps.post.outputs.review-comments-skipped }}

runs:
  using: composite
  steps:
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Install Critiq CLI and rules
      shell: bash
      run: node "${{ github.action_path }}/src/main.mjs" install
      env:
        INPUT_WORKING_DIRECTORY: ${{ inputs.working-directory }}
        INPUT_CLI_VERSION: ${{ inputs.cli-version }}
        INPUT_RULES_VERSION: ${{ inputs.rules-version }}

    - name: Run critiq check
      id: scan
      shell: bash
      continue-on-error: true
      run: node "${{ github.action_path }}/src/main.mjs" scan
      env:
        INPUT_WORKING_DIRECTORY: ${{ inputs.working-directory }}
        INPUT_TARGET: ${{ inputs.target }}
        INPUT_STAGED: ${{ inputs.staged }}
        INPUT_BASE_REF: ${{ inputs.base-ref }}
        INPUT_HEAD_REF: ${{ inputs.head-ref }}
        GITHUB_EVENT_NAME: ${{ github.event_name }}

    - name: Post PR comments
      id: post
      shell: bash
      continue-on-error: true
      run: node "${{ github.action_path }}/src/main.mjs" post
      env:
        INPUT_COMMENT_MODE: ${{ inputs.comment-mode }}
        INPUT_JSON_PATH: ${{ steps.scan.outputs.json-path }}
        GITHUB_EVENT_NAME: ${{ github.event_name }}
        GITHUB_TOKEN: ${{ github.token }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_API_URL: ${{ github.api_url }}

    - name: Fail on severity threshold
      if: ${{ inputs.fail-on-severity != 'off' }}
      shell: bash
      run: node "${{ github.action_path }}/src/main.mjs" fail-on-severity
      env:
        CRITIQ_JSON_PATH: ${{ steps.scan.outputs.json-path }}
        FAIL_ON_SEVERITY: ${{ inputs.fail-on-severity }}
