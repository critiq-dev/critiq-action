name: Run critiq check
description: Runs critiq check and writes JSON + step outputs (exit-code, finding-count, json-path).

inputs:
  working-directory:
    required: false
    default: '.'
  target:
    required: false
    default: '.'
  staged:
    required: false
    default: 'false'
  base-ref:
    required: false
    default: ''
  head-ref:
    required: false
    default: ''

outputs:
  exit-code:
    description: Exit code from critiq check
    value: ${{ steps.run.outputs.exit-code }}
  finding-count:
    description: Number of catalog findings in the JSON envelope
    value: ${{ steps.run.outputs.finding-count }}
  json-path:
    description: Path to the critiq JSON output file on the runner
    value: ${{ steps.run.outputs.json-path }}

runs:
  using: composite
  steps:
    - id: run
      shell: bash
      continue-on-error: true
      run: node "${{ github.action_path }}/run.mjs"
      env:
        INPUT_WORKING_DIRECTORY: ${{ inputs.working-directory }}
        INPUT_TARGET: ${{ inputs.target }}
        INPUT_STAGED: ${{ inputs.staged }}
        INPUT_BASE_REF: ${{ inputs.base-ref }}
        INPUT_HEAD_REF: ${{ inputs.head-ref }}
        GITHUB_EVENT_NAME: ${{ github.event_name }}
